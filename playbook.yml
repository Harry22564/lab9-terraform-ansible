---
- name: Konfiguracja serwera WWW
  hosts: webservers
  become: true

  tasks:

    - name: Aktualizacja cache apt
      apt:
        update_cache: yes

    - name: Instalacja Apache
      apt:
        name: apache2
        state: present

    - name: Uruchomienie Apache
      service:
        name: apache2
        state: started
        enabled: yes

    - name: Kopiowanie strony
      copy:
        src: files/index.html
        dest: /var/www/html/index.html
        owner: www-data
        group: www-data
        mode: '0644'
